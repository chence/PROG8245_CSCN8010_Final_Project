<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">MediChat Architecture Diagram</title>
  <desc id="desc">Architecture diagram for the MediChat multilingual medical information chatbot with routing, clarification, and session summary agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8ff" />
      <stop offset="100%" stop-color="#eef5ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f9fbff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#b9c8e6" flood-opacity="0.35" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5873a6" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #22324f; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #55719c; }
      .section { font: 700 24px Arial, sans-serif; fill: #243755; }
      .box-title { font: 700 20px Arial, sans-serif; fill: #22324f; }
      .box-text { font: 500 16px Arial, sans-serif; fill: #384d73; }
      .small { font: 500 14px Arial, sans-serif; fill: #506789; }
      .tiny { font: 500 13px Arial, sans-serif; fill: #61789a; }
      .panel { fill: url(#panel); stroke: #c9d8ef; stroke-width: 2; rx: 26; }
      .box-blue { fill: #eef4ff; stroke: #8eb1f2; stroke-width: 2; rx: 18; }
      .box-green { fill: #edf9f2; stroke: #75c79d; stroke-width: 2; rx: 18; }
      .box-orange { fill: #fff4e9; stroke: #f0b06d; stroke-width: 2; rx: 18; }
      .box-violet { fill: #f5f0ff; stroke: #b59bed; stroke-width: 2; rx: 18; }
      .box-gold { fill: #fff9e8; stroke: #d9b55b; stroke-width: 2; rx: 18; }
      .connector { stroke: #5873a6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .connector-dashed { stroke: #6b88b7; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .divider { stroke: #d6e1f3; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)" />

  <text x="80" y="68" class="title">MediChat Architecture Diagram</text>
  <text x="80" y="102" class="subtitle">Classical ML + retrieval + multilingual preprocessing + lightweight AI agent layer</text>

  <rect x="50" y="135" width="290" height="650" class="panel" filter="url(#shadow)" />
  <text x="78" y="182" class="section">Front End / Client</text>

  <rect x="78" y="210" width="234" height="108" class="box-blue" />
  <text x="102" y="244" class="box-title">User</text>
  <text x="102" y="274" class="box-text">Student or demo audience</text>
  <text x="102" y="298" class="small">Asks questions by text or voice</text>

  <rect x="78" y="345" width="234" height="250" class="box-blue" />
  <text x="102" y="379" class="box-title">Gradio Web UI</text>
  <text x="102" y="408" class="box-text">`app.py`</text>
  <text x="102" y="435" class="small">Conversation window</text>
  <text x="102" y="459" class="small">History sidebar</text>
  <text x="102" y="483" class="small">Turn details</text>
  <text x="102" y="507" class="small">Text composer and send</text>
  <text x="102" y="531" class="small">Microphone recording</text>
  <text x="102" y="555" class="small">Shared session links</text>

  <rect x="78" y="625" width="234" height="70" class="box-orange" />
  <text x="102" y="667" class="box-title">Protocol</text>
  <text x="205" y="667" class="box-text">HTTP / WebSocket</text>

  <rect x="380" y="135" width="420" height="650" class="panel" filter="url(#shadow)" />
  <text x="410" y="182" class="section">Application / Middleware</text>

  <rect x="412" y="210" width="356" height="88" class="box-orange" />
  <text x="438" y="242" class="box-title">Request Orchestration</text>
  <text x="438" y="270" class="box-text">`app.py` event handlers and UI state</text>

  <rect x="412" y="318" width="356" height="88" class="box-orange" />
  <text x="438" y="350" class="box-title">Speech + Language Preprocessing</text>
  <text x="438" y="378" class="box-text">Transcription, language detection, translation to English</text>

  <rect x="412" y="426" width="356" height="88" class="box-gold" />
  <text x="438" y="458" class="box-title">Routing Agent</text>
  <text x="438" y="486" class="box-text">Greeting, urgent safety, summary, or standard QA path</text>

  <rect x="412" y="534" width="356" height="88" class="box-gold" />
  <text x="438" y="566" class="box-title">Clarification Agent</text>
  <text x="438" y="594" class="box-text">Requests more detail when the user query is vague</text>

  <rect x="412" y="642" width="356" height="108" class="box-orange" />
  <text x="438" y="674" class="box-title">Standard Runtime Flow</text>
  <text x="438" y="702" class="box-text">Build contextual query and call `MediChatEngine`</text>
  <text x="438" y="726" class="small">ML intent classification + retrieval + controlled generation</text>

  <rect x="840" y="135" width="710" height="650" class="panel" filter="url(#shadow)" />
  <text x="870" y="182" class="section">Back End Services and Data Resources</text>
  <line x1="1165" y1="206" x2="1165" y2="760" class="divider" />
  <text x="885" y="215" class="subtitle">Runtime Services</text>
  <text x="1200" y="215" class="subtitle">Data / Models / Storage</text>

  <rect x="872" y="235" width="260" height="86" class="box-green" />
  <text x="896" y="267" class="box-title">Speech-to-Text</text>
  <text x="896" y="294" class="box-text">`src/speech_to_text.py`</text>

  <rect x="872" y="340" width="260" height="96" class="box-green" />
  <text x="896" y="372" class="box-title">Translation Layer</text>
  <text x="896" y="399" class="box-text">`src/translation.py`</text>
  <text x="896" y="422" class="small">Detect and translate languages</text>

  <rect x="872" y="455" width="260" height="96" class="box-green" />
  <text x="896" y="487" class="box-title">Dialogue Manager</text>
  <text x="896" y="514" class="box-text">`src/dialogue_manager.py`</text>
  <text x="896" y="537" class="small">Context building + summary generation</text>

  <rect x="872" y="570" width="260" height="110" class="box-green" />
  <text x="896" y="602" class="box-title">MediChat Engine</text>
  <text x="896" y="629" class="box-text">`src/predict.py`</text>
  <text x="896" y="652" class="small">Orchestrates intent, retrieval, safety, and response flow</text>

  <rect x="1200" y="240" width="310" height="90" class="box-violet" />
  <text x="1226" y="272" class="box-title">Intent Classifier</text>
  <text x="1226" y="299" class="box-text">Classical ML model artifact</text>
  <text x="1226" y="322" class="small">Naive Bayes / Logistic Regression pipelines</text>

  <rect x="1200" y="350" width="310" height="90" class="box-violet" />
  <text x="1226" y="382" class="box-title">Knowledge Base</text>
  <text x="1226" y="409" class="box-text">`medical_knowledge_base.json`</text>
  <text x="1226" y="432" class="small">Curated supported medical snippets</text>

  <rect x="1200" y="460" width="310" height="90" class="box-violet" />
  <text x="1226" y="492" class="box-title">Fallback Responses</text>
  <text x="1226" y="519" class="box-text">`intent_responses.json`</text>
  <text x="1226" y="542" class="small">Safe unsupported-answer templates</text>

  <rect x="1200" y="570" width="310" height="100" class="box-violet" />
  <text x="1226" y="602" class="box-title">SQLite Chat Store</text>
  <text x="1226" y="629" class="box-text">`data/medichat.sqlite3`</text>
  <text x="1226" y="652" class="small">Sessions, messages, metadata, and summaries</text>

  <rect x="1200" y="690" width="310" height="90" class="box-violet" />
  <text x="1226" y="722" class="box-title">Evaluation Artifacts</text>
  <text x="1226" y="749" class="box-text">Metrics tables and confusion matrices</text>

  <rect x="350" y="820" width="1180" height="110" class="panel" filter="url(#shadow)" />
  <text x="380" y="860" class="section">Offline ML Pipeline</text>
  <text x="380" y="892" class="box-text">`src/data_processing.py` -> `src/train.py` -> `src/evaluate.py` -> saved model artifacts used by the runtime intent classifier</text>

  <path d="M 312 264 C 340 264, 352 254, 380 254" class="connector" />
  <path d="M 312 468 C 340 468, 352 254, 380 254" class="connector" />
  <path d="M 312 660 C 340 660, 352 254, 380 254" class="connector" />

  <path d="M 768 254 C 800 254, 820 278, 872 278" class="connector" />
  <path d="M 768 362 C 800 362, 820 388, 872 388" class="connector" />
  <path d="M 768 470 C 800 470, 820 503, 872 503" class="connector" />
  <path d="M 768 578 C 800 578, 820 625, 872 625" class="connector" />
  <path d="M 768 696 C 810 696, 824 625, 872 625" class="connector" />

  <path d="M 1132 625 C 1160 625, 1170 285, 1200 285" class="connector" />
  <path d="M 1132 630 C 1160 630, 1170 395, 1200 395" class="connector" />
  <path d="M 1132 635 C 1160 635, 1170 505, 1200 505" class="connector" />
  <path d="M 1132 640 C 1160 640, 1170 620, 1200 620" class="connector" />

  <path d="M 980 930 C 980 902, 1240 880, 1240 780" class="connector-dashed" />

  <text x="430" y="785" class="tiny">Agent-enhanced runtime: preprocess -> route -> clarify if needed -> ML + retrieval -> respond -> summarize session -> persist and display</text>
</svg>
